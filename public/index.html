<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orus Company - Portfolio</title>
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: #0d0d0d;
            color: #f0ece0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            color: #c9a84c;
            margin-bottom: 40px;
        }
        .logo span { color: #c9a84c; }
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            padding: 16px 32px;
            background: #c9a84c;
            color: #0d0d0d;
            text-decoration: none;
            font-weight: 500;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #e8c96e;
        }
        .subtitle {
            font-size: 18px;
            color: #bbbbaa;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="logo">O<span>R</span>US</h1>
        <p class="subtitle">Choose your language</p>
        <div class="buttons">
            <a href="/brasil" class="btn">Português (Brasil)</a>
            <a href="/italia" class="btn">Italiano</a>
        </div>
    </div>
</body>
</html>
